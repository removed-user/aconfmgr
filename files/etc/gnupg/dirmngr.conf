keyserver <URL>: Specifies the default OpenPGP keyserver, such as hkps://keys.openpgp.org.
http-proxy <host>[:<port>]: Sets a proxy for HTTP connections.
honor-http-proxy: Uses the http_proxy environment variable.
ldap-proxy <host>[:<port>]: Sets a proxy for LDAP connections.
allow-ocsp: Enables Online Certificate Status Protocol (OCSP) to check certificate revocation.
no-http-certs: Disables the use of SSL/TLS certificates for HTTP access.
log-file <file>: Directs logs to a specific file, e.g., ~/dirmngr.log.
verbose: Increases the amount of information logged.
debug-level <level>: Sets debugging to basic, advanced, expert, or guru.
disable-check-own-socket: Disables the check that ensures only one dirmngr is running.
force: Forces loading of expired Certificate Revocation Lists (CRLs). 
Important Notes:
Lines starting with # are treated as comments.
After editing, restart dirmngr using gpgconf --kill dirmngr.
Use dirmngr --dump-options to list all supported options for your specific version. 
